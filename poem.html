<h1 align="center">过零丁洋<sup>1</sup></h1>
<hr>
<h2 align="center"><strong>文天祥</strong/h2>
<p align="center"><辛苦遭逢起一经><sup>2</sup>,<u>干戈寥落</u>四周星<br>
山河破碎风飘絮，身世浮沉雨打萍。<br>
惶恐滩头说惶恐，零丁洋里叹零丁。<br>
人生自古谁无死？留取丹心照汗青。</b></p>
<p></p>
<i>(1)
<i>(2)
