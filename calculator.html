<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>网页版计算器</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        body {
            background: linear-gradient(135deg, #07111f 0%, #0f1f3b 45%, #162b4f 100%);
        }

        .header {
            background: rgba(7, 12, 29, 0.95);
        }

        .nav-button {
            color: #f8fafc;
            text-decoration: none;
        }

        .calculator-page {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }

        .calculator-shell {
            width: min(460px, 100%);
            padding: 28px;
            border-radius: 24px;
            background: rgba(5, 12, 27, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.28);
        }

        .calculator-heading {
            margin: 0 0 12px;
            font-size: 1.7rem;
            font-weight: 700;
            color: #f8fafc;
        }

        .calculator-copy {
            margin: 0 0 20px;
            color: #a8b4d1;
            line-height: 1.6;
        }

        .calculator-display {
            margin-bottom: 18px;
            padding: 22px 20px;
            min-height: 78px;
            border-radius: 18px;
            background: linear-gradient(135deg, #e2e8f0, #f8fafc);
            color: #0f172a;
            font-size: 2rem;
            font-weight: 700;
            text-align: right;
            overflow-x: auto;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            word-break: break-all;
        }

        .calculator-keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .calc-btn {
            border: none;
            border-radius: 14px;
            padding: 16px 0;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease;
        }

        .calc-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.16);
        }

        .calc-btn:active {
            transform: translateY(0);
        }

        .calc-number {
            background: #f8fafc;
            color: #111827;
        }

        .calc-operator,
        .calc-equals {
            background: linear-gradient(135deg, #f59e0b, #f97316);
            color: #fff;
        }

        .calc-clear {
            background: #ef4444;
            color: #fff;
        }

        .calc-zero {
            grid-column: span 2;
        }

        .calc-equals {
            grid-column: span 2;
        }

        @media (max-width: 640px) {
            .calculator-shell {
                padding: 20px;
            }

            .calculator-display {
                min-height: 68px;
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="site-shell">
        <header class="header">
            <div class="brand">NBA 篮球经理</div>
            <nav class="nav-bar">
                <a class="nav-button" href="index.html">首页</a>
                <a class="nav-button active" href="calculator.html">计算器</a>
            </nav>
            <div class="user-panel">
                <div class="user-info">业务计算，轻松高效</div>
            </div>
        </header>

        <main class="content calculator-page">
            <section class="calculator-shell">
                <h1 class="calculator-heading">网页版计算器</h1>
                <p class="calculator-copy">支持日常运算，方便开展业务统计与演算。</p>
                <div class="calculator-display" id="display" aria-live="polite">0</div>
                <div class="calculator-keypad">
                    <button type="button" class="calc-btn calc-clear" data-action="clear">C</button>
                    <button type="button" class="calc-btn calc-operator" data-action="delete">DEL</button>
                    <button type="button" class="calc-btn calc-operator" data-action="operator" data-value="/">÷</button>
                    <button type="button" class="calc-btn calc-operator" data-action="operator" data-value="*">×</button>

                    <button type="button" class="calc-btn calc-number" data-action="number" data-value="7">7</button>
                    <button type="button" class="calc-btn calc-number" data-action="number" data-value="8">8</button>
                    <button type="button" class="calc-btn calc-number" data-action="number" data-value="9">9</button>
                    <button type="button" class="calc-btn calc-operator" data-action="operator" data-value="-">-</button>

                    <button type="button" class="calc-btn calc-number" data-action="number" data-value="4">4</button>
                    <button type="button" class="calc-btn calc-number" data-action="number" data-value="5">5</button>
                    <button type="button" class="calc-btn calc-number" data-action="number" data-value="6">6</button>
                    <button type="button" class="calc-btn calc-operator" data-action="operator" data-value="+">+</button>

                    <button type="button" class="calc-btn calc-number" data-action="number" data-value="1">1</button>
                    <button type="button" class="calc-btn calc-number" data-action="number" data-value="2">2</button>
                    <button type="button" class="calc-btn calc-number" data-action="number" data-value="3">3</button>
                    <button type="button" class="calc-btn calc-equals" data-action="equals">=</button>

                    <button type="button" class="calc-btn calc-number calc-zero" data-action="number" data-value="0">0</button>
                    <button type="button" class="calc-btn calc-number" data-action="number" data-value=".">.</button>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>© 2026 NBA 篮球经理，静态演示站点</p>
        </footer>
    </div>

    <script>
        const display = document.getElementById('display');
        const keypad = document.querySelector('.calculator-keypad');
        let expression = '';
        let lastAction = '';

        function updateDisplay(value) {
            display.textContent = value;
        }

        function isOperator(value) {
            return ['+', '-', '*', '/'].includes(value);
        }

        function formatResult(value) {
            return Number(value).toFixed(2);
        }

        function appendNumber(value) {
            if (lastAction === 'equals') {
                expression = '';
                lastAction = '';
            }
            if (value === '.' && expression.includes('.')) {
                return;
            }
            if (value === '.' && expression === '') {
                expression = '0.';
                updateDisplay(expression);
                return;
            }
            if (expression === '0' && value !== '.') {
                expression = value;
            } else {
                expression += value;
            }
            updateDisplay(expression);
        }

        function appendOperator(value) {
            if (lastAction === 'equals') {
                lastAction = '';
            }
            if (expression === '') {
                if (value === '-') {
                    expression = '-';
                    updateDisplay(expression);
                }
                return;
            }
            if (isOperator(expression.slice(-1))) {
                expression = expression.slice(0, -1) + value;
            } else {
                expression += value;
            }
            updateDisplay(expression);
            lastAction = 'operator';
        }

        function calculate() {
            if (!expression || isOperator(expression.slice(-1))) {
                return;
            }
            const normalized = expression.replace(/×/g, '*').replace(/÷/g, '/');
            try {
                const result = Function(`"use strict"; return (${normalized})`)();
                if (!Number.isFinite(result)) {
                    throw new Error('invalid');
                }
                expression = formatResult(result);
                updateDisplay(expression);
                lastAction = 'equals';
            } catch (error) {
                expression = '';
                updateDisplay('0');
                lastAction = '';
            }
        }

        function clearExpression() {
            expression = '';
            lastAction = '';
            updateDisplay('0');
        }

        function deleteLast() {
            if (lastAction === 'equals') {
                clearExpression();
                return;
            }
            if (expression.length > 0) {
                expression = expression.slice(0, -1);
                updateDisplay(expression || '0');
            }
        }

        keypad.addEventListener('click', (event) => {
            const button = event.target.closest('button');
            if (!button) {
                return;
            }
            const { action, value } = button.dataset;
            if (action === 'number') {
                appendNumber(value);
            } else if (action === 'operator') {
                appendOperator(value);
            } else if (action === 'equals') {
                calculate();
            } else if (action === 'clear') {
                clearExpression();
            } else if (action === 'delete') {
                deleteLast();
            }
        });
    </script>
</body>
</html>
